<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نور اليقين — Logo System</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&family=Reem+Kufi:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f0e8; font-family: Inter, sans-serif; min-height: 100vh; }

    .page { max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; }

    .page-title {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: #065f46;
      margin-bottom: 4px;
    }
    .page-sub {
      text-align: center;
      font-family: Amiri, serif;
      font-size: 22px;
      color: #b45309;
      margin-bottom: 48px;
    }

    .section {
      margin-bottom: 56px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.36em;
      text-transform: uppercase;
      color: #6b7280;
      margin-bottom: 18px;
      border-bottom: 1px solid #d1fae5;
      padding-bottom: 6px;
    }

    /* Light / Dark split */
    .split {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: flex-start;
    }
    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .tile-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #6b7280;
    }
    .dark-bg {
      background: #011a13;
      padding: 24px;
      border-radius: 16px;
    }
    .light-bg {
      background: #ecfdf5;
      padding: 24px;
      border-radius: 16px;
    }
    .favbg {
      background: #022c22;
      padding: 20px 28px;
      border-radius: 16px;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      flex-wrap: wrap;
    }
    .fav-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .fav-cell span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #6ee7b7;
    }
    .grad-emerald {
      background: linear-gradient(135deg, #047857 0%, #022c22 100%);
    }
  </style>
</head>
<body>
<div class="page" id="root"></div>

<script type="text/babel">
/* ── Logo Components ─────────────────────────────────────────── */

function LogoCrescentMonogram({ size = 320, dark = false }) {
  const bg     = dark ? '#022c22' : '#065f46';
  const accent = '#fbbf24';
  const ring   = dark ? '#0f3a30' : '#047857';
  return (
    <svg viewBox="0 0 320 320" width={size} height={size} style={{display:'block'}}>
      <defs>
        <linearGradient id="l1bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor={dark ? '#064e3b' : '#047857'} />
          <stop offset="100%" stopColor={bg} />
        </linearGradient>
        <radialGradient id="l1glow" cx="0.5" cy="0.5" r="0.6">
          <stop offset="0%" stopColor="#fcd34d" stopOpacity="0.18" />
          <stop offset="100%" stopColor="#fcd34d" stopOpacity="0" />
        </radialGradient>
      </defs>
      <rect width="320" height="320" rx="68" fill="url(#l1bg)" />
      <circle cx="160" cy="160" r="140" fill="url(#l1glow)" />
      <g transform="translate(160 160)" fill="none" stroke={ring} strokeWidth="1.2" opacity="0.6">
        <rect x="-110" y="-110" width="220" height="220" rx="6" />
        <rect x="-110" y="-110" width="220" height="220" rx="6" transform="rotate(45)" />
      </g>
      <g transform="translate(160 160)" fill="none" stroke={accent} strokeWidth="1" opacity="0.45">
        <circle r="118" />
        <circle r="92" />
      </g>
      <mask id="l1m">
        <rect width="320" height="320" fill="white" />
        <circle cx="190" cy="160" r="62" fill="black" />
      </mask>
      <circle cx="158" cy="160" r="74" fill={accent} mask="url(#l1m)" />
      <polygon points="208,108 213,121 227,122 216,131 220,145 208,138 196,145 200,131 189,122 203,121" fill="#fcd34d" />
      <rect x="68" y="252" width="184" height="2" fill={accent} opacity="0.6" />
      <text x="160" y="280" textAnchor="middle" fill={accent} fontSize="14"
            style={{fontFamily:'Inter', letterSpacing:'0.32em', fontWeight:600}}>
        NOOR AL-YAQEEN
      </text>
    </svg>
  );
}

function LogoHorizontalLockup({ width = 520, dark = false }) {
  const fg     = dark ? '#fcd34d' : '#065f46';
  const sub    = dark ? '#fbbf24' : '#047857';
  const accent = '#d97706';
  return (
    <svg viewBox="0 0 520 140" width={width} style={{display:'block'}}>
      <g transform="translate(0 10)">
        <rect width="120" height="120" rx="26" fill={dark ? '#022c22' : '#065f46'} />
        <g transform="translate(60 60)" fill="none" stroke={dark ? '#fcd34d' : '#fbbf24'} opacity="0.35" strokeWidth="0.9">
          <rect x="-42" y="-42" width="84" height="84" />
          <rect x="-42" y="-42" width="84" height="84" transform="rotate(45)" />
          <circle r="36" />
        </g>
        <mask id="l2m">
          <rect width="120" height="120" fill="white" />
          <circle cx="74" cy="60" r="22" fill="black" />
        </mask>
        <circle cx="62" cy="60" r="26" fill="#fbbf24" mask="url(#l2m)" />
        <polygon points="86,38 88.6,44.6 96,45.2 90.2,49.8 92,57 86,53.2 80,57 81.8,49.8 76,45.2 83.4,44.6" fill="#fcd34d" />
      </g>
      <g transform="translate(146 0)">
        <text x="0" y="58" fill={fg} style={{fontFamily:'Amiri', fontWeight:700, fontSize:'52px', direction:'rtl'}}>
          نور اليقين
        </text>
        <line x1="0" y1="74" x2="320" y2="74" stroke={accent} strokeWidth="1" opacity="0.5" />
        <text x="0" y="100" fill={sub} style={{fontFamily:'Inter', fontWeight:700, fontSize:'22px', letterSpacing:'0.08em'}}>
          Noor Al-Yaqeen
        </text>
        <text x="0" y="122" fill={dark ? '#34d399' : '#0f766e'} style={{fontFamily:'Inter', fontWeight:500, fontSize:'11px', letterSpacing:'0.32em', textTransform:'uppercase'}}>
          Your Daily Islamic Companion
        </text>
      </g>
    </svg>
  );
}

function LogoStampSeal({ size = 320, dark = false }) {
  const bg     = dark ? '#022c22' : '#fffbeb';
  const ink    = dark ? '#fcd34d' : '#065f46';
  const accent = dark ? '#fbbf24' : '#b45309';
  return (
    <svg viewBox="0 0 320 320" width={size} height={size} style={{display:'block'}}>
      <rect width="320" height="320" fill={bg} rx="20" />
      <circle cx="160" cy="160" r="138" fill="none" stroke={ink} strokeWidth="2" />
      <circle cx="160" cy="160" r="128" fill="none" stroke={accent} strokeWidth="0.8" />
      <circle cx="160" cy="160" r="92"  fill="none" stroke={ink} strokeWidth="1" opacity="0.6" />
      <defs>
        <path id="topArc" d="M 40,160 A 120,120 0 0 1 280,160" />
        <path id="botArc" d="M 50,170 A 110,110 0 0 0 270,170" />
      </defs>
      <text fill={ink} style={{fontFamily:'Amiri', fontWeight:700, fontSize:'22px'}}>
        <textPath href="#topArc" startOffset="50%" textAnchor="middle">رفيقك الإسلامي اليومي</textPath>
      </text>
      <text fill={accent} style={{fontFamily:'Inter', fontWeight:600, fontSize:'13px', letterSpacing:'0.32em'}}>
        <textPath href="#botArc" startOffset="50%" textAnchor="middle">DAILY · DHIKR · DUA · QURAN</textPath>
      </text>
      <g transform="translate(160 158)">
        <g fill={accent} opacity="0.18">
          <rect x="-58" y="-58" width="116" height="116" />
          <rect x="-58" y="-58" width="116" height="116" transform="rotate(45)" />
        </g>
        <mask id="l3m">
          <rect x="-80" y="-80" width="160" height="160" fill="white" />
          <circle cx="14" cy="0" r="34" fill="black" />
        </mask>
        <circle cx="-4" cy="0" r="40" fill={ink} mask="url(#l3m)" />
        <polygon points="32,-30 35,-22 43,-21 36.5,-15 39,-7 32,-12 25,-7 27.5,-15 21,-21 29,-22" fill={accent} />
      </g>
      <g fill={accent}>
        <circle cx="40" cy="160" r="3" />
        <circle cx="280" cy="160" r="3" />
      </g>
    </svg>
  );
}

function LogoKufic({ width = 520, dark = false }) {
  const ink    = dark ? '#fcd34d' : '#065f46';
  const accent = '#d97706';
  return (
    <svg viewBox="0 0 520 220" width={width} style={{display:'block'}}>
      <g stroke={accent} strokeWidth="1.4" fill="none" opacity="0.85">
        <path d="M30 110 Q 50 60 90 80" />
        <path d="M30 110 Q 50 160 90 140" />
        <circle cx="30" cy="110" r="3" fill={accent} />
      </g>
      <g stroke={accent} strokeWidth="1.4" fill="none" opacity="0.85">
        <path d="M490 110 Q 470 60 430 80" />
        <path d="M490 110 Q 470 160 430 140" />
        <circle cx="490" cy="110" r="3" fill={accent} />
      </g>
      <text x="260" y="120" textAnchor="middle" fill={ink}
            style={{fontFamily:"'Reem Kufi', 'Amiri', serif", fontWeight:700, fontSize:'78px', direction:'rtl'}}>
        نور اليقين
      </text>
      <line x1="160" y1="146" x2="360" y2="146" stroke={accent} strokeWidth="1.2" />
      <g transform="translate(260 146)" fill={accent}>
        <polygon points="-7,0 0,-5 7,0 0,5" />
      </g>
      <text x="260" y="180" textAnchor="middle" fill={accent}
            style={{fontFamily:'Inter', fontWeight:600, fontSize:'18px', letterSpacing:'0.42em'}}>
        NOOR · AL · YAQEEN
      </text>
    </svg>
  );
}

function LogoMihrab({ size = 320, dark = false }) {
  const bg     = dark ? '#022c22' : '#065f46';
  const accent = '#fbbf24';
  return (
    <svg viewBox="0 0 320 360" width={size} height={size*360/320} style={{display:'block'}}>
      <rect width="320" height="360" rx="18" fill={bg} />
      <path d="M 60 180 L 60 320 L 260 320 L 260 180 Q 160 40 60 180 Z"
            fill="none" stroke={accent} strokeWidth="2" opacity="0.85" />
      <path d="M 78 188 L 78 304 L 242 304 L 242 188 Q 160 70 78 188 Z"
            fill="none" stroke={accent} strokeWidth="0.8" opacity="0.55" />
      <g transform="translate(160 180)" fill={accent} opacity="0.95">
        <rect x="-26" y="-26" width="52" height="52" />
        <rect x="-26" y="-26" width="52" height="52" transform="rotate(45)" />
      </g>
      <circle cx="160" cy="180" r="10" fill={bg} />
      <circle cx="160" cy="180" r="6" fill={accent} />
      <text x="160" y="260" textAnchor="middle" fill={accent}
            style={{fontFamily:'Amiri', fontWeight:700, fontSize:'34px', direction:'rtl'}}>
        نور اليقين
      </text>
      <line x1="100" y1="280" x2="220" y2="280" stroke={accent} opacity="0.6" />
      <text x="160" y="340" textAnchor="middle" fill={accent}
            style={{fontFamily:'Inter', fontWeight:600, fontSize:'12px', letterSpacing:'0.36em'}}>
        NOOR AL-YAQEEN
      </text>
    </svg>
  );
}

function FaviconTile({ size, label }) {
  const id = `fm${size}`;
  return (
    <div className="fav-cell">
      <div style={{
        width: size, height: size,
        background: 'linear-gradient(135deg,#047857 0%,#022c22 100%)',
        borderRadius: '18%',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        overflow: 'hidden',
        boxShadow: '0 2px 8px #0004'
      }}>
        <svg viewBox="0 0 100 100" width={size} height={size}>
          <g transform="translate(50 50)" fill="none" stroke="#fbbf24" opacity="0.35" strokeWidth="0.6">
            <rect x="-32" y="-32" width="64" height="64" />
            <rect x="-32" y="-32" width="64" height="64" transform="rotate(45)" />
          </g>
          <mask id={id}>
            <rect width="100" height="100" fill="white" />
            <circle cx="59" cy="50" r="20" fill="black" />
          </mask>
          <circle cx="49" cy="50" r="24" fill="#fbbf24" mask={`url(#${id})`} />
          <polygon points="74,32 76,37 81,37.4 77,40.5 78.4,45.5 74,42.6 69.6,45.5 71,40.5 67,37.4 72,37" fill="#fcd34d" />
        </svg>
      </div>
      <span>{label}px</span>
    </div>
  );
}

/* ── App Shell ───────────────────────────────────────────── */
function App() {
  return (
    <div className="page">
      <p className="page-title">Brand Identity System</p>
      <p className="page-sub">نور اليقين · Noor Al-Yaqeen</p>

      {/* Logo 01 */}
      <div className="section">
        <p className="section-label">01 — Crescent Monogram (App Icon)</p>
        <div className="split">
          <div className="tile">
            <div className="light-bg"><LogoCrescentMonogram size={200} dark={false} /></div>
            <span className="tile-label">Light</span>
          </div>
          <div className="tile">
            <div className="dark-bg"><LogoCrescentMonogram size={200} dark={true} /></div>
            <span className="tile-label">Dark</span>
          </div>
          <div className="tile">
            <LogoCrescentMonogram size={100} dark={false} />
            <span className="tile-label">100px</span>
          </div>
          <div className="tile">
            <LogoCrescentMonogram size={64} dark={false} />
            <span className="tile-label">64px</span>
          </div>
        </div>
      </div>

      {/* Logo 02 */}
      <div className="section">
        <p className="section-label">02 — Horizontal Lockup (Header / Nav)</p>
        <div style={{display:'flex', flexDirection:'column', gap:20}}>
          <div className="light-bg"><LogoHorizontalLockup width={500} dark={false} /></div>
          <div className="dark-bg"><LogoHorizontalLockup width={500} dark={true} /></div>
        </div>
      </div>

      {/* Logo 03 */}
      <div className="section">
        <p className="section-label">03 — Stamp / Seal (Badge)</p>
        <div className="split">
          <div className="tile">
            <div className="light-bg"><LogoStampSeal size={220} dark={false} /></div>
            <span className="tile-label">Light</span>
          </div>
          <div className="tile">
            <div className="dark-bg"><LogoStampSeal size={220} dark={true} /></div>
            <span className="tile-label">Dark</span>
          </div>
        </div>
      </div>

      {/* Logo 04 */}
      <div className="section">
        <p className="section-label">04 — Kufic / Calligraphic Wordmark</p>
        <div style={{display:'flex', flexDirection:'column', gap:20}}>
          <div className="light-bg"><LogoKufic width={500} dark={false} /></div>
          <div className="dark-bg"><LogoKufic width={500} dark={true} /></div>
        </div>
      </div>

      {/* Logo 05 */}
      <div className="section">
        <p className="section-label">05 — Mihrab Arch Emblem</p>
        <div className="split">
          <div className="tile">
            <LogoMihrab size={200} dark={false} />
            <span className="tile-label">Light</span>
          </div>
          <div className="tile">
            <LogoMihrab size={200} dark={true} />
            <span className="tile-label">Dark</span>
          </div>
        </div>
      </div>

      {/* Logo 06 — Favicons */}
      <div className="section">
        <p className="section-label">06 — Favicon Sheet (16 → 180px)</p>
        <div className="favbg">
          <FaviconTile size={16}  label="16" />
          <FaviconTile size={32}  label="32" />
          <FaviconTile size={64}  label="64" />
          <FaviconTile size={128} label="128" />
          <FaviconTile size={180} label="180 (Apple)" />
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
