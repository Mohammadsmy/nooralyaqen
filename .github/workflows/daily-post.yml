name: Daily Instagram Post

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post daily content to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import datetime, urllib.parse, urllib.request, urllib.error, json, time, os

          ig_user = os.environ.get("IG_USER_ID", "")
          token   = os.environ.get("IG_TOKEN", "")

          if not ig_user or not token:
              print("ERROR: Secrets not set!")
              exit(1)
          print(f"User ID: {ig_user[:8]}...")

          # Post index cycles through all 45 posts (Quran, Hadith, Dhikr)
          day   = datetime.datetime.now(datetime.timezone.utc).timetuple().tm_yday
          index = (day - 1) % 45
          print(f"Post index: {index}")

          # Short clean URL — no Arabic in URL, API handles it internally
          image_url = f"https://nooralyaqeen.vercel.app/api/card?i={index}"
          print(f"Image URL: {image_url}")

          # Post labels for caption
          POST_TYPES = [
              'quran','quran','quran','quran','quran',
              'hadith','hadith','hadith','hadith','hadith',
              'dhikr','dhikr','dhikr','dhikr','dhikr',
              'quran','quran','quran','quran','quran',
              'quran','quran','quran','quran','quran',
              'quran','quran','quran','quran','quran',
              'hadith','hadith','hadith','hadith','hadith',
              'hadith','hadith','hadith','hadith','hadith',
              'dhikr','dhikr','dhikr','dhikr','dhikr',
          ]
          POST_REFS = [
              'Al-Talaq 65:2-3','Ash-Sharh 94:5-8','Al-Baqarah 2:186','Yusuf 12:87','Al-Baqarah 2:255',
              'Sahih al-Bukhari','Sahih Muslim','Sahih Muslim','Sunan al-Tirmidhi','Sahih al-Bukhari',
              'Sahih al-Bukhari & Muslim','Sahih al-Bukhari','Sayyid al-Istighfar','Al-Imran 3:173','Sunan Abu Dawud',
              'Al-Baqarah 2:152','Al-Baqarah 2:153','Al-Baqarah 2:156','Al-Baqarah 2:201','Al-Baqarah 2:286',
              "Ar-Ra'd 13:28",'Ibrahim 14:7','Al-Kahf 18:10','Al-Qasas 28:24','Al-Ahzab 33:41-42',
              'Az-Zumar 39:53','Ghafir 40:60','Ash-Shura 42:25','Ad-Duha 93:3-5','Al-Inshirah 94:1-4',
              'Sunan al-Tirmidhi',"Al-Mu'jam al-Awsat",'Sunan Abu Dawud','Sahih al-Bukhari','Sahih al-Bukhari',
              'Sunan al-Tirmidhi','Sahih al-Bukhari','Sunan Abu Dawud','Sahih al-Bukhari','Sahih Muslim',
              'Sunan al-Tirmidhi','Sahih al-Bukhari','Sahih al-Bukhari & Muslim','Sahih Muslim','Sunan Abu Dawud',
          ]
          TYPE_EMOJI = {'quran':'\U0001f4d6', 'hadith':'\U0001f4dc', 'dhikr':'\U0001f4ff'}
          TYPE_AR    = {'quran':'آية اليوم', 'hadith':'حديث اليوم', 'dhikr':'ذكر اليوم'}

          ptype = POST_TYPES[index]
          ref   = POST_REFS[index]
          emoji = TYPE_EMOJI[ptype]
          ar_label = TYPE_AR[ptype]

          caption = (
              f"{ar_label} | {ref}\n\n"
              f"{emoji} {ar_label}\n\n"
              f"nooralyaqeen.vercel.app\n\n"
              "#NoorAlYaqeen #نور_اليقين #QuranDaily #IslamicReminder #Islam #Quran #Hadith #Dhikr #Muslim #Faith"
          )

          # Create Instagram media container
          print("Creating Instagram container...")
          post_data = urllib.parse.urlencode({
              "image_url":    image_url,
              "caption":      caption,
              "access_token": token,
          }).encode()

          try:
              req = urllib.request.Request(
                  f"https://graph.facebook.com/v18.0/{ig_user}/media",
                  data=post_data, method="POST"
              )
              with urllib.request.urlopen(req) as r:
                  container = json.load(r)
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Instagram API error {e.code}: {body}")
              exit(1)

          creation_id = container["id"]
          print(f"Container created: {creation_id}")

          print("Waiting 30s for Instagram to process...")
          time.sleep(30)

          # Publish
          print("Publishing...")
          pub_data = urllib.parse.urlencode({
              "creation_id":  creation_id,
              "access_token": token,
          }).encode()

          try:
              req2 = urllib.request.Request(
                  f"https://graph.facebook.com/v18.0/{ig_user}/media_publish",
                  data=pub_data, method="POST"
              )
              with urllib.request.urlopen(req2) as r:
                  result = json.load(r)
          except urllib.error.HTTPError as e:
              body = e.read().decode()
              print(f"Publish error {e.code}: {body}")
              exit(1)

          print(f"SUCCESS! Post ID: {result.get('id')}")
          PYEOF
